version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-server
    ports:
      - "6379:6379"
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./config/redis.conf:/etc/redis/redis.conf:ro
      - redis-data:/data
    restart: unless-stopped
    networks:
      - services-network

volumes:
  redis-data:
    driver: local

networks:
  services-network:
    driver: bridge