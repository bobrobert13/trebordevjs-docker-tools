# Redis Configuration
bind 0.0.0.0
port 6379
protected-mode no

# Persistence
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Security
# requirepass yourpassword

# Performance
tcp-keepalive 300
timeout 0

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""