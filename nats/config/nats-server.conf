# NATS Server Configuration
port: 4222
http_port: 8222

# Logging
debug: false
trace: false
logtime: true
log_file: "/data/nats.log"

# Limits
max_connections: 65536
max_control_line: 4KB
max_payload: 8MB
max_pending: 64MB

# Clustering
cluster {
  port: 6222
  name: "nats-cluster"
  
  # Authorization for cluster connections
  authorization {
    user: "cluster"
    password: "clusterpass"
    timeout: 2
  }
  
  # Routes are actively solicited and connected to from this server.
  # This Docker image has none initially.
  routes = []
}

# Monitoring
http_base_path: "/"