version: '3.8'

services:
  # PostHog Web Application
  posthog:
    image: posthog/posthog:${POSTHOG_VERSION:-latest}
    container_name: posthog-web
    ports:
      - "${POSTHOG_PORT:-8000}:8000"
    environment:
      # Core Configuration
      - SITE_URL=${POSTHOG_SITE_URL:-http://localhost:8000}
      - SECRET_KEY=${POSTHOG_SECRET_KEY:-your-secret-key-change-this}
      - DEBUG=${POSTHOG_DEBUG:-0}
      - DEMO=${POSTHOG_DEMO:-0}
      
      # Database Configuration
      - DATABASE_URL=${POSTHOG_DATABASE_URL:-postgresql://posthog:posthog@posthog-db:5432/posthog}
      - POSTHOG_DB_NAME=${POSTHOG_DB_NAME:-posthog}
      - POSTHOG_DB_USER=${POSTHOG_DB_USER:-posthog}
      - POSTHOG_DB_PASSWORD=${POSTHOG_DB_PASSWORD:-posthog123}
      
      # Redis Configuration
      - REDIS_URL=${POSTHOG_REDIS_URL:-redis://posthog-redis:6379/0}
      - POSTHOG_REDIS_HOST=${POSTHOG_REDIS_HOST:-posthog-redis}
      - POSTHOG_REDIS_PORT=${POSTHOG_REDIS_PORT:-6379}
      
      # ClickHouse Configuration
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-posthog}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_CLUSTER=${CLICKHOUSE_CLUSTER:-posthog}
      - CLICKHOUSE_REPLICATION=${CLICKHOUSE_REPLICATION:-true}
      
      # Kafka Configuration
      - KAFKA_URL=${KAFKA_URL:-kafka:9092}
      - KAFKA_HOSTS=${KAFKA_HOSTS:-kafka:9092}
      - KAFKA_CLIENT_CERT_B64=${KAFKA_CLIENT_CERT_B64:-}
      - KAFKA_CLIENT_CERT_KEY_B64=${KAFKA_CLIENT_CERT_KEY_B64:-}
      - KAFKA_TRUSTED_CERT_B64=${KAFKA_TRUSTED_CERT_B64:-}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-PLAIN}
      - KAFKA_SASL_USER=${KAFKA_SASL_USER:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
      
      # Object Storage Configuration
      - OBJECT_STORAGE_ENABLED=${OBJECT_STORAGE_ENABLED:-true}
      - OBJECT_STORAGE_ENDPOINT=${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      - OBJECT_STORAGE_ACCESS_KEY_ID=${OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}
      - OBJECT_STORAGE_SECRET_ACCESS_KEY=${OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}
      - OBJECT_STORAGE_BUCKET=${OBJECT_STORAGE_BUCKET:-posthog}
      - OBJECT_STORAGE_MEDIA_BUCKET=${OBJECT_STORAGE_MEDIA_BUCKET:-posthog-media}
      - OBJECT_STORAGE_SESSION_RECORDING_BUCKET=${OBJECT_STORAGE_SESSION_RECORDING_BUCKET:-posthog-session-recordings}
      
      # Email Configuration
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-}
      
      # Security Configuration
      - ALLOWED_IP_BLOCKS=${ALLOWED_IP_BLOCKS:-}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-}
      - SECURE_COOKIES=${SECURE_COOKIES:-true}
      - TOOLBAR_VERSION=${TOOLBAR_VERSION:-toolbar}
      
      # Analytics and Performance
      - PRIMARY_DB=${PRIMARY_DB:-clickhouse}
      - ANALYTICAL_DATABASE_URL=${ANALYTICAL_DATABASE_URL:-}
      - EVENT_PROPERTY_USAGE_INTERVAL_SECONDS=${EVENT_PROPERTY_USAGE_INTERVAL_SECONDS:-86400}
      - EVENT_NAMES_CACHE_DURATION=${EVENT_NAMES_CACHE_DURATION:-300}
      
      # Feature Flags
      - CAPTURE_INTERNAL_METRICS=${CAPTURE_INTERNAL_METRICS:-false}
      - CAPTURE_TIME_TO_SEE_DATA=${CAPTURE_TIME_TO_SEE_DATA:-false}
      - SESSION_RECORDING_KAFKA_PARTITIONS=${SESSION_RECORDING_KAFKA_PARTITIONS:-1}
      - SESSION_RECORDING_KAFKA_TOPIC_NAME=${SESSION_RECORDING_KAFKA_TOPIC_NAME:-clickhouse_session_recording_events}
      
      # Monitoring and Debugging
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_PROFILES_SAMPLE_RATE=${SENTRY_PROFILES_SAMPLE_RATE:-0.1}
      
      # Rate Limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-100}
      - RATE_LIMIT_RATE=${RATE_LIMIT_RATE:-10}
      
      # Caching
      - REDIS_CELERY_BROKER_URL=${REDIS_CELERY_BROKER_URL:-redis://posthog-redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://posthog-redis:6379/2}
      
      # Workers Configuration
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-2}
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-1000}
      - CELERY_WORKER_POOL=${CELERY_WORKER_POOL:-prefork}
      
      # Async Migrations
      - ASYNC_MIGRATIONS_DISABLE_AUTO_RUN=${ASYNC_MIGRATIONS_DISABLE_AUTO_RUN:-false}
      - ASYNC_MIGRATIONS_AUTO_CONTINUE=${ASYNC_MIGRATIONS_AUTO_CONTINUE:-true}
      
      # Plugins
      - PLUGINS_INSTALL_VIA_API=${PLUGINS_INSTALL_VIA_API:-true}
      - PLUGINS_RELOAD_PLUGINS=${PLUGINS_RELOAD_PLUGINS:-true}
      
      # Instance Settings
      - INSTANCE_PREFERENCES=${INSTANCE_PREFERENCES:-}
      - CLOUD_DEPLOYMENT=${CLOUD_DEPLOYMENT:-self-hosted}
    volumes:
      - posthog-data:/app/data
      - ./config/posthog.yml:/app/posthog.yml:ro
    depends_on:
      posthog-db:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - services-network
      - posthog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/_health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.posthog.rule=Host(`${POSTHOG_DOMAIN:-posthog.localhost}`)"
      - "traefik.http.routers.posthog.entrypoints=web"
      - "traefik.http.services.posthog.loadbalancer.server.port=8000"
      - "traefik.http.routers.posthog-secure.rule=Host(`${POSTHOG_DOMAIN:-posthog.localhost}`)"
      - "traefik.http.routers.posthog-secure.entrypoints=websecure"
      - "traefik.http.routers.posthog-secure.tls=true"
      - "traefik.http.routers.posthog-secure.tls.certresolver=letsencrypt"

  # PostHog Worker (Background Tasks)
  posthog-worker:
    image: posthog/posthog:${POSTHOG_VERSION:-latest}
    container_name: posthog-worker
    command: ./bin/docker-worker-celery --with-scheduler
    environment:
      # Same environment as web, but for workers
      - SITE_URL=${POSTHOG_SITE_URL:-http://localhost:8000}
      - SECRET_KEY=${POSTHOG_SECRET_KEY:-your-secret-key-change-this}
      - DEBUG=${POSTHOG_DEBUG:-0}
      - DATABASE_URL=${POSTHOG_DATABASE_URL:-postgresql://posthog:posthog@posthog-db:5432/posthog}
      - REDIS_URL=${POSTHOG_REDIS_URL:-redis://posthog-redis:6379/0}
      - REDIS_CELERY_BROKER_URL=${REDIS_CELERY_BROKER_URL:-redis://posthog-redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://posthog-redis:6379/2}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - KAFKA_URL=${KAFKA_URL:-kafka:9092}
      - OBJECT_STORAGE_ENABLED=${OBJECT_STORAGE_ENABLED:-true}
      - OBJECT_STORAGE_ENDPOINT=${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      - OBJECT_STORAGE_ACCESS_KEY_ID=${OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}
      - OBJECT_STORAGE_SECRET_ACCESS_KEY=${OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-2}
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-1000}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      - posthog-db
      - posthog-redis
      - clickhouse
      - kafka
    restart: unless-stopped
    networks:
      - posthog-network
    profiles:
      - with-workers

  # PostHog Plugins Server
  posthog-plugins:
    image: posthog/posthog:${POSTHOG_VERSION:-latest}
    container_name: posthog-plugins
    command: ./bin/docker-plugin-server
    environment:
      - SITE_URL=${POSTHOG_SITE_URL:-http://localhost:8000}
      - SECRET_KEY=${POSTHOG_SECRET_KEY:-your-secret-key-change-this}
      - DATABASE_URL=${POSTHOG_DATABASE_URL:-postgresql://posthog:posthog@posthog-db:5432/posthog}
      - REDIS_URL=${POSTHOG_REDIS_URL:-redis://posthog-redis:6379/0}
      - KAFKA_HOSTS=${KAFKA_HOSTS:-kafka:9092}
      - PLUGINS_INSTALL_VIA_API=${PLUGINS_INSTALL_VIA_API:-true}
      - PLUGINS_RELOAD_PLUGINS=${PLUGINS_RELOAD_PLUGINS:-true}
    depends_on:
      - posthog-db
      - posthog-redis
      - kafka
    restart: unless-stopped
    networks:
      - posthog-network
    profiles:
      - with-plugins

  # PostgreSQL Database
  posthog-db:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: posthog-db
    ports:
      - "${POSTHOG_DB_PORT:-5434}:5432"
    environment:
      - POSTGRES_DB=${POSTHOG_DB_NAME:-posthog}
      - POSTGRES_USER=${POSTHOG_DB_USER:-posthog}
      - POSTGRES_PASSWORD=${POSTHOG_DB_PASSWORD:-posthog123}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - posthog-db-data:/var/lib/postgresql/data
      - ./scripts/init-posthog-db.sql:/docker-entrypoint-initdb.d/init-posthog-db.sql:ro
    restart: unless-stopped
    networks:
      - posthog-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTHOG_DB_USER:-posthog} -d ${POSTHOG_DB_NAME:-posthog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  posthog-redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: posthog-redis
    ports:
      - "${POSTHOG_REDIS_PORT:-6381}:6379"
    command: redis-server /etc/redis/redis.conf
    volumes:
      - posthog-redis-data:/data
      - ./config/redis.conf:/etc/redis/redis.conf:ro
    restart: unless-stopped
    networks:
      - posthog-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse Analytics Database
  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-23.8}
    container_name: posthog-clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-posthog}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config/clickhouse-config.xml:/etc/clickhouse-server/config.d/custom-config.xml:ro
      - ./scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/init-clickhouse.sql:ro
    restart: unless-stopped
    networks:
      - posthog-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka Event Streaming
  kafka:
    image: bitnami/kafka:${KAFKA_VERSION:-3.5}
    container_name: posthog-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_INTERNAL_PORT:-9093}:9093"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LOG_RETENTION_HOURS=24
      - KAFKA_CFG_LOG_RETENTION_BYTES=1073741824
      - KAFKA_CFG_LOG_SEGMENT_BYTES=134217728
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka-data:/bitnami/kafka
    restart: unless-stopped
    networks:
      - posthog-network
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Zookeeper for Kafka
  zookeeper:
    image: bitnami/zookeeper:${ZOOKEEPER_VERSION:-3.8}
    container_name: posthog-zookeeper
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    volumes:
      - zookeeper-data:/bitnami/zookeeper
    restart: unless-stopped
    networks:
      - posthog-network
    healthcheck:
      test: ["CMD", "zkCli.sh", "ls", "/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO Object Storage
  minio:
    image: minio/minio:${MINIO_VERSION:-latest}
    container_name: posthog-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - posthog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Temporal Workflow Engine (Optional)
  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-1.20}
    container_name: posthog-temporal
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${POSTHOG_DB_USER:-posthog}
      - POSTGRES_PWD=${POSTHOG_DB_PASSWORD:-posthog123}
      - POSTGRES_SEEDS=posthog-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./config/temporal-dynamic-config.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    restart: unless-stopped
    networks:
      - posthog-network
    depends_on:
      - posthog-db
    profiles:
      - with-temporal

volumes:
  posthog-data:
    driver: local
  posthog-db-data:
    driver: local
  posthog-redis-data:
    driver: local
  clickhouse-data:
    driver: local
  kafka-data:
    driver: local
  zookeeper-data:
    driver: local
  minio-data:
    driver: local

networks:
  services-network:
    external: true
  posthog-network:
    driver: bridge
    name: posthog-network